name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests (trainer + coach)
        run: npm test

      - name: Build standalone (vite build + inline)
        run: npm run build:standalone

      - name: Vérifier que le standalone commité est à jour
        run: |
          if ! git diff --quiet -- index-standalone.html; then
            echo "::error::index-standalone.html n'est pas à jour — lancer 'npm run build:standalone' et committer."
            exit 1
          fi

      - name: Publier le standalone en artefact
        uses: actions/upload-artifact@v4
        with:
          name: pokerforge-standalone
          path: index-standalone.html
          retention-days: 30
