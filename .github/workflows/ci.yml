name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests (trainer + coach)
        run: npm test

      # Le moteur du solveur (§23) n'était couvert par AUCUN job : `npm test` ne
      # lance que trainer/coach/mental. Les 160 assertions de validate.mjs ne
      # tournaient qu'en local, donc un ✅ de CI ne disait rien du solveur.
      - name: Tests moteur solveur (validation §23)
        run: npm run test:solver

      # Complémentaire et non redondant : validate.mjs vérifie la cohérence interne,
      # le benchmark confronte le moteur à des RÉFÉRENCES EXTERNES (équités publiées,
      # clairvoyance analytique). Aucune assertion sur le temps — les durées sont
      # seulement affichées — donc pas de flakiness sur un runner partagé.
      - name: Benchmark moteur solveur (références §24)
        run: npm run bench:solver

      - name: Build standalone (vite build + inline)
        run: npm run build:standalone

      - name: Vérifier que le standalone commité est à jour
        run: |
          if ! git diff --quiet -- index-standalone.html; then
            echo "::error::index-standalone.html n'est pas à jour — lancer 'npm run build:standalone' et committer."
            exit 1
          fi

      - name: Publier le standalone en artefact
        uses: actions/upload-artifact@v4
        with:
          name: pokerforge-standalone
          path: index-standalone.html
          retention-days: 30
